experiment:
  name: chord_transcription_v1
  seed: 42
  device: "cuda"

data:
  train_jsonl_path: "data/pairs.train.jsonl"
  valid_jsonl_path: "data/pairs.validation.jsonl"
  quality_json_path: "data/quality.json"
  quality_class_count_path: "data/quality_freq_count.json"
  log_dir: "logs"
  checkpoint_dir: "checkpoints"

data_loader:
  sample_rate: 22050
  hop_length: 512
  use_beat_annotations: true
  beat_root_dir: "dataset/beats"
  num_workers: 3
  prefetch_factor: 4
  naming_mode: "auto"         # "auto" | "plain" | "prefixed"
  stem_order: ["vocals", "drums", "bass", "other", "piano", "guitar"]
  pin_memory: false
  drop_last: false

  pitch_augmentation:
    enabled: true
    semitone_range: [-6, 5] # -6から+5半音の範囲でランダムにシフト
    p: 1.0

  stem_augmentation:
    enabled: true
    dropout:
      p: 0.0  # ステム・ドロップアウトを適用しない
      min_stems: 2

    mixing:
      p: 0.5  # 50%の確率でランダム・ゲインを適用
      min_gain_db: -6.0 # 各ステムのゲインを -6dB から
      max_gain_db: 3.0  # +3dB の範囲でランダムに変更

  waveform_augmentation:
    enabled: false
    eq_tilt:
      p: 0.25
      min_db_per_octave: -3.0
      max_db_per_octave: 3.0
      pivot_hz: 700.0
    saturation:
      p: 0.20
      min_drive_db: 1.0
      max_drive_db: 6.0
      min_wet: 0.6
      max_wet: 1.0
    colored_noise:
      p: 0.20
      types: ["white", "pink", "brown"]
      min_snr_db: 20.0
      max_snr_db: 35.0
    compression:
      p: 0.20
      min_threshold_db: -24.0
      max_threshold_db: -12.0
      min_ratio: 1.25
      max_ratio: 2.5
      frame_ms: 20.0
      min_makeup_db: 0.0
      max_makeup_db: 1.5
    stereo:
      mono_p: 0.05
      balance_p: 0.20
      max_balance_db: 3.0

model:
  backbone:
    sampling_rate: 22050
    hop_length: 512
    n_fft: 2048
    hidden_size: 64
    num_layers: 1
    dropout: 0.1
    # 精度向上にかなり寄与するが、強度が強すぎると学習が停滞する
    spec_augment_params:
        freq_mask_param: 15
        time_mask_param: 40
        num_freq_masks: 1
        num_time_masks: 2
        p: 0.5
  classifier:
    hidden_size: 512              # BaseTranscriptionModel の H
    dropout_probability: 0.1
    use_layer_norm: true
    lm_head:                      # null にすると無効化
      hidden_size: 256
      num_heads: 4
      num_layers: 2
      dropout: 0.1

  # ルート/ベース/キー/クオリティのクラス数
  num_root_classes: 13
  num_bass_classes: 13
  num_quality_classes: 63
  num_key_classes: 13



base_model_training:
  epochs: 500
  segment_seconds: 60.0
  batch_size: 4
  grad_accum_steps: 4
  repeat_ssm:
    enabled: true
    enable_from_epoch: 1
    window_size: 4
    max_span_ratio: 1.5
  amp: false
  grad_clip_norm: null
  log_every_n_steps: 50
  model_save_every_n_epochs: 5
  validate_every_n_epochs: 5

  optimizer:
    type: "adamw"
    lr: 5.0e-4
    weight_decay: 1e-4
    betas: [0.9, 0.999]

  scheduler:
    type: "cosine"                   # "none" | "cosine" | "step"
    cosine_tmax: 500                # cosine 用
    step_size: 20                  # step 用
    gamma: 0.5

  loss:
    ce_ignore_index: -100
    key_label_smoothing: 0.0      # key head専用のlabel smoothing
    boundary_pos_weight: 5.0       # ShiftTolerantBCELoss の positive weight（不均衡なら>1）
    boundary_tolerance: 1         # ShiftTolerantBCELoss の許容シフト幅
    beat_pos_weight: 5.0
    beat_tolerance: 1
    downbeat_pos_weight: 20.0
    downbeat_tolerance: 1
    key_boundary_pos_weight: 40.0
    key_boundary_tolerance: 10
    balanced_softmax_tau: 0.3
    focal_tversky:
      alpha: 0.3                    # Tversky index の alpha
      gamma: 1.5                   # Focal Tversky Loss の gamma

    weights:
      root_chord: 0.1
      bass: 0.1
      key: 0.2
      boundary: 3.0
      beat: 1.0
      downbeat: 1.0
      chord25: 10.0
      key_boundary: 3.0
      lm_next_token: 1.0
      repeat_root_consistency: 0.1
      repeat_bass_consistency: 0.1
